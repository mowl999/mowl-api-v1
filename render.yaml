services:
  - type: web
    name: mowl-api-v1
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: support@moneyowlcredit.com
      - key: RESET_TOKEN_MINUTES
        value: "30"
      - key: ENABLE_LOAN_REMINDER_JOBS
        value: "false"
      - key: LOAN_REMINDER_INTERVAL_MINUTES
        value: "60"
      - key: LOAN_REMINDER_UPCOMING_DAYS
        value: "7"
      - key: LOAN_REMINDER_REPEAT_DAYS
        value: "7"
      - key: LOAN_REMINDER_EMAIL_ENABLED
        value: "true"
      - key: LOAN_REMINDER_INAPP_ENABLED
        value: "true"
